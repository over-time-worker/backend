server:
  port: ${AI_SERVER_PORT}
eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:${EUREKA_PORT:8761}/eureka
spring:
  config:
    import: optional:file:.env[.properties]
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  #  jackson:
  #    property-naming-strategy: SNAKE_CASE
  application:
    name: ai-service
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        default_batch_fetch_size: 1000
        format_sql: true
  datasource:
    hikari:
      maximum-pool-size: 20
      max-lifetime: 177000
    driver-class-name: org.postgresql.Driver
#    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB}
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${AI_POSTGRES_PORT:5432}/${POSTGRES_DB}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}

management:
  zipkin:
    tracing:
      endpoint: "http://${ZIPKIN_HOST:localhost}:${ZIPKIN_PORT:9411}/api/v2/spans"
  tracing:
    sampling:
      probability: ${ZIPKIN_SAMPLING_PROBABILITY:1.0}

api :
  connection-timeout: 3000
  read-timeout: 120000
  max-buffer-size-MB: 300
  ai:
    url: ${AI_URL}
    key: ${AI_KEY}
    hub :
      request-base: ${AI_HUB_REQUEST_BASE}
      request-format: ${AI_HUB_REQUEST_FORMAT}
    company:
      request-base: ${AI_COMPANY_REQUEST_BASE}
      request-format: ${AI_COMPANY_REQUEST_FORMAT}
logging:
  logstash:
    host: ${LOGSTASH_HOST:localhost}